    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #000; margin: 0;
            padding: 0;top:-10;
        }

        /* Header */
        header {
            position: fixed; z-index: 30;
            top: 5;
            width: 100%;
            background: none;
           
            padding: 20px;
            /*-----------border-bottom: 1px solid #eee;--------*/
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 18px;
            font-weight: normal;
            color: #000;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 0;
        }

        nav ul li {
            background: white;
            border: 1px solid #000;
            margin-left: -1px;
        }

        nav ul li:first-child {
            margin-left: 0;
        }

        nav ul li a {
            display: block;
            padding: 12px 20px;
            color: #000;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        nav ul li a:hover,
        nav ul li a.active {
            background-color: #f0f0f0;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 2px;
            background: #000;
            transition: 0.3s;
        }

        /* Main Content */
        main {
            margin-top: 0px;
            min-height: calc(100vh - 80px);
        }

        .page {
            display: none;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        /* Home Page */
        .home-image {
            width: 100%;
            height: calc(100vh - 80px);
            object-fit: cover;
        }

        /* Projects Page */
        .projects-container {
            background: white;
            padding: 40px 20px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-bottom: 60px;
        }

        .project-item {
            padding: 20px;
            border: 1px solid #eee;
        }

        .project-item h3 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .project-item p {
            font-size: 14px;
            line-height: 1.5;
        }

        .projects-section {
            margin-bottom: 50px;
        }

        .projects-section h2 {
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: normal;
        }

        /* Works Page */
        .works-container {
            background: white;
            padding: 40px 20px;
        }

        .works-submenu {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            margin-bottom: 40px;
            border: 1px solid #000;
        }

        .works-submenu button {
            background: white;
            border: none;
            border-right: 1px solid #000;
            padding: 12px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .works-submenu button:last-child {
            border-right: none;
        }

        .works-submenu button:hover,
        .works-submenu button.active {
            background-color: #f0f0f0;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .work-item {
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .work-item:hover {
            opacity: 0.8;
        }

        .work-placeholder {
            width: 100%;
            aspect-ratio: 9/8;
            background: #f5f5f5;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }

        .work-title {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }

        /* Work Detail Modal */
        .work-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .work-modal-content {
            background: white;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .work-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .work-modal img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .work-modal h3 {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .work-modal p {
            line-height: 1.6;
        }

        /* CV and Contact Pages */
        .cv-container,
        .contact-container {
            background: white;
            padding: 40px 20px;
        }

        .cv-container h1,
        .contact-container h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: normal;
        }

        .cv-container p,
        .contact-container p {
            font-size: 16px;
            line-height: 1.6;
            max-width: 800px;
        }


       .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;margin:0px; padding:0px;z-index:-2;
        }
    
        /* Video Container (Bigger Div) */
        .video-container {
            flex-grow: 1;
			margin:0px; 
			padding:0px;
            position: relative;
            width: 100%;           
			top: -20;
            left: -420;
            background: #000;
/* The fallback image logic */

            background-size: cover;
            background-position: center;
			background-color: #000;
			overflow:hidden;

        }

        .video-container iframe {
            position: absolute;margin:0px; padding:0px;
            top: -20px;

            width: 120%;
            height: 120%;
            border: none;
			opacity:0.4;

        }
		 #fondo{
			 padding:50%; 
			 z-index:2; 
			 position: absolute;
			 overflow:hidden;
		 }





        /* Mobile Styles */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav ul {
                position: fixed;
                top: 80px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 80px);
                background: white;
                flex-direction: column;
                transition: left 0.3s;
                border-top: 1px solid #eee;
            }

            nav ul.show {
                left: 0;
            }

            nav ul li {
                border: none;
                border-bottom: 1px solid #eee;
                margin: 0;
            }

            nav ul li a {
                padding: 20px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .works-submenu {
                flex-direction: column;
            }

            .works-submenu button {
                border-right: none;
                border-bottom: 1px solid #000;
            }

            .works-submenu button:last-child {
                border-bottom: none;
            }

            .work-modal-content {
                padding: 20px;
                margin: 20px;
            }
	  	
	  
    </style>
</head>

    <script>
        // Sample works data
        const works = [
            { id: 1, title: "Untitled #1", category: "paintings", size: "120 x 90 cm", year: "2023", image: "https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=400&h=356&fit=crop" },
            { id: 2, title: "Digital Landscape", category: "webart", size: "Variable dimensions", year: "2023", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&h=356&fit=crop" },
            { id: 3, title: "Study in Charcoal", category: "drawings", size: "50 x 70 cm", year: "2022", image: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&h=356&fit=crop" },
            { id: 4, title: "Moving Images", category: "videoart", size: "4K Video, 5:30 min", year: "2023", image: "https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?w=400&h=356&fit=crop" },
            { id: 5, title: "Color Study #3", category: "paintings", size: "100 x 100 cm", year: "2022", image: "https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=400&h=356&fit=crop" },
            { id: 6, title: "Interactive Piece", category: "webart", size: "Web-based", year: "2023", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&h=356&fit=crop" },
            { id: 7, title: "Portrait Series #2", category: "drawings", size: "40 x 60 cm", year: "2023", image: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&h=356&fit=crop" },
            { id: 8, title: "Time Lapse", category: "videoart", size: "HD Video, 3:15 min", year: "2022", image: "https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?w=400&h=356&fit=crop" },
            { id: 9, title: "Abstract #5", category: "paintings", size: "150 x 200 cm", year: "2023", image: "https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=400&h=356&fit=crop" },
            { id: 10, title: "Generative Art", category: "webart", size: "Variable dimensions", year: "2023", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&h=356&fit=crop" }
        ];

        // Navigation functions
        function showPage(pageId) {
            // Hide all pages
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            
            // Show selected page
            document.getElementById(pageId).classList.add('active');
            
            // Update navigation
            const navLinks = document.querySelectorAll('nav a');
            navLinks.forEach(link => link.classList.remove('active'));
            
            // Close mobile menu
            document.getElementById('nav-menu').classList.remove('show');
        }

        function toggleMenu() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.classList.toggle('show');
        }

        // Works functions
        function renderWorks(filteredWorks = works) {
            const worksGrid = document.getElementById('works-grid');
            worksGrid.innerHTML = '';
            
            filteredWorks.forEach(work => {
                const workItem = document.createElement('div');
                workItem.className = 'work-item';
                workItem.onclick = () => openWorkModal(work);
                
                workItem.innerHTML = `
                    <div class="work-placeholder" style="background-image: url('${work.image}'); background-size: cover; background-position: center;">
                    </div>
                    <div class="work-title">${work.title}</div>
                `;
                
                worksGrid.appendChild(workItem);
            });
        }

        function filterWorks(category) {
            // Update active button
            const buttons = document.querySelectorAll('.works-submenu button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Filter works
            const filteredWorks = category === 'all' ? works : works.filter(work => work.category === category);
            renderWorks(filteredWorks);
        }

        function openWorkModal(work) {
            const modal = document.getElementById('work-modal');
            const modalImage = document.getElementById('modal-image');
            const modalTitle = document.getElementById('modal-title');
            const modalDetails = document.getElementById('modal-details');
            
            modalImage.src = work.image;
            modalTitle.textContent = work.title;
            modalDetails.innerHTML = `Size: ${work.size}<br>Year: ${work.year}`;
            
            modal.style.display = 'flex';
        }

        function closeWorkModal() {
            document.getElementById('work-modal').style.display = 'none';
        }

        // Close modal when clicking outside
        document.getElementById('work-modal').onclick = function(e) {
            if (e.target === this) {
                closeWorkModal();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderWorks();
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(e) {
            const nav = document.querySelector('nav');
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.getElementById('nav-menu');
            
            if (!nav.contains(e.target) && !hamburger.contains(e.target)) {
                navMenu.classList.remove('show');
            }
        });
    </script>
